<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スロットマシン</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #1e1e1e;
        color: white;
    }

    h1 {
        margin-top: 20px;
    }

    .controls {
        margin: 10px;
    }

    input {
        padding: 5px;
        margin: 5px;
        width: 80px;
    }

    .buttons {
        margin: 10px;
    }

    button {
        padding: 10px 25px;
        margin: 5px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .start { background: green; color: white; }
    .stop { background: red; color: white; }
    .reset { background: gray; color: white; }

    .slot {
        margin: 40px auto;
        width: 80%;
        min-height: 140px;
        font-size: 60px;
        border: 4px solid white;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
        background: black;
        padding: 20px;
    }

    .number {
        background: #00cc66;
        color: black;
        padding: 10px 20px;
        border-radius: 10px;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>🎰 スロットマシン 🎰/h1>

<!-- 数量 -->
<div class="controls">
    <label>数字の数:</label>
    <input type="number" id="amount" value="3" min="1" max="20">
</div>

<!-- 範囲 -->
<div class="controls">
    <label>最小:</label>
    <input type="number" id="min" value="0" min="0" max="100">

    <label>最大:</label>
    <input type="number" id="max" value="40" min="1" max="100">
</div>

<!-- START / STOP -->
<div class="buttons">
    <button class="start" onclick="start()">スタート</button>
    <button class="stop" onclick="stop()">ストップ</button>
</div>

<!-- RESET -->
<div class="buttons">
    <button class="reset" onclick="resetGame()">リセット</button>
</div>

<!-- 結果 -->
<div class="slot" id="slot"></div>

<script>
let interval = null;

function getRandom(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateNumbers() {
    const amount = parseInt(document.getElementById("amount").value);
    let min = parseInt(document.getElementById("min").value);
    let max = parseInt(document.getElementById("max").value);

    if (max > 100) max = 100;
    if (min < 0) min = 0;
    if (min > max) [min, max] = [max, min];

    const slot = document.getElementById("slot");
    slot.innerHTML = "";

    for (let i = 0; i < amount; i++) {
        let num = getRandom(min, max);

        let div = document.createElement("div");
        div.className = "number";
        div.textContent = num;

        slot.appendChild(div);
    }
}

function start() {
    if (interval) return;
    interval = setInterval(generateNumbers, 80);
}

function stop() {
    clearInterval(interval);
    interval = null;
}

function resetGame() {
    stop();
    document.getElementById("slot").innerHTML = "";
}
</script>

</body>
</html>
